syntax = "proto3";

package p2pws;

// command: 7 (P2PCommand.GET_FILE)
// command: 14 (P2PCommand.PUT_FILE)
message FileDataModel {
  uint32 store_id = 1;
  uint64 length = 2;
  bytes data = 3;
  string path = 4;
  string md5 = 5;
  uint32 block_size = 6;
}

// command: 20 (P2PCommand.GET_FILE_SEGMENTS)
// command: 21 (P2PCommand.PUT_FILE_SEGMENTS)
message FileSegmentsDataModel {
  uint32 store_id = 1;
  uint64 length = 2;
  uint64 start = 3;
  uint32 block_index = 4;
  uint32 block_size = 5;
  bytes block_data = 6;
  string block_md5 = 7;
  string path = 8;
  string md5 = 9;
}

// command: 19 (P2PCommand.FILES_COMMAND)
message FilesCommandModel {
  uint32 store_id = 1;
  string command = 2;
  repeated string params = 3;
  bytes data = 4;
}

message StringList {
  repeated string items = 1;
}

// command: 50
message FileRenameRequest {
  uint32 store_id = 1;
  string src_path = 2;
  string dst_path = 3;
}

// command: 51
message FileListRequest {
  uint32 store_id = 1;
  string path = 2;
  uint32 page = 3;
  uint32 page_size = 4;
}

message FileListEntry {
  string name = 1;
  string path = 2;
  bool is_dir = 3;
  uint64 size = 4;
  uint64 modified_ms = 5;
}

message FileListResponse {
  uint32 page = 1;
  uint32 page_size = 2;
  uint32 total = 3;
  repeated FileListEntry items = 4;
}

// command: 1001
message FilePutRequest {
  string file_name = 1;
  uint64 file_size = 2;
  bytes file_hash_sha256 = 3;
  bytes content = 4;
}

// command: 1002
message FilePutResponse {
  bool success = 1;
  string error_message = 2;
  bytes file_hash_sha256 = 3;
}

// command: 1003
message FileGetRequest {
  bytes file_hash_sha256 = 1;
}

// command: 1004
message FileGetResponse {
  bool found = 1;
  string file_name = 2;
  uint64 file_size = 3;
  bytes content = 4;
}
