version: 1
project:
    name: p2p-net-storage
    slug: p2p-net-storage
    runtime: unknown
    memory:
        accepted_note_globs:
            - AGENTS.md
            - docs/**
            - .brain/context/**
            - .brain/resources/**
session:
    require_task: true
    single_active: true
    active_file: .brain/session.json
    ledger_dir: .brain/sessions
preflight:
    require_brain_doctor: true
    required_docs:
        - AGENTS.md
        - .brain/context/overview.md
        - .brain/context/workflows.md
        - .brain/context/memory-policy.md
    suggested_commands:
        - brain find p2p-net-storage
        - brain search "p2p-net-storage {task}"
closeout:
    acceptable_history_operations:
        - create
        - update
        - move
        - rename
        - publish
        - seed
    require_memory_update_on_repo_change: true
    verification_profiles: []
