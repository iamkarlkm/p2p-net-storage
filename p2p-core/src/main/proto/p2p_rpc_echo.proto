syntax = "proto3";

package p2p.rpc.echo.v1;

option java_multiple_files = true;
option java_package = "javax.net.p2p.rpc.echo.proto";
option java_outer_classname = "RpcEchoProto";

message EchoRequest {
  string message = 1;
}

message EchoResponse {
  string message = 1;
  int64 server_time = 2;
}
